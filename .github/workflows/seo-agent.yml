name: SEO Agent — daily data-driven optimization

# Philosophy: success = clicks/traffic, NOT number of pages.
# The default daily job MEASURES past changes and OPTIMIZES existing pages
# (title/meta rewrites of near-page-1, low-CTR pages). Bulk page generation is
# OFF by default and only runs when explicitly opted-in via workflow_dispatch,
# because mass geo/article generation previously created thin/duplicate pages.

on:
  schedule:
    - cron: "30 5 * * *"   # 08:30 MSK (UTC+3) every day
  workflow_dispatch:
    inputs:
      opt_max_changes:
        description: "Max title/meta optimizations per run (default: 8)"
        default: "8"
      generate_pages:
        description: "Also GENERATE new pages this run? (true/false — default false)"
        default: "false"
      max_articles:
        description: "[gen] Max new blog articles per run"
        default: "3"
      max_titles:
        description: "[gen] Max legacy title updates per run"
        default: "10"
      max_typegeo:
        description: "[gen] Max type+geo pages per run"
        default: "3"
      max_product_updates:
        description: "[gen] Max product description updates"
        default: "5"
      run_news:
        description: "[gen] Generate news articles (true/false)"
        default: "false"
      max_geo_pages:
        description: "[gen] Bulk geo pages per run"
        default: "100"
      geo_mode:
        description: "[gen] Geo mode: russia | world | all"
        default: "all"
      geo_langs:
        description: "[gen] Languages (space-separated, empty=all)"
        default: ""
      geo_products:
        description: "[gen] Product IDs (space-separated, empty=all)"
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cryptography

      # ── Step 1: Fetch search data ──────────────────────────────

      - name: Fetch GSC queries
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/fetch_gsc_queries.py
        continue-on-error: true

      - name: Fetch Yandex queries
        env:
          YANDEX_WM_TOKEN: ${{ secrets.YANDEX_WM_TOKEN }}
        run: python scripts/fetch_yandex_queries.py
        continue-on-error: true

      - name: Analyze opportunities
        run: python scripts/analyze_queries.py
        continue-on-error: true

      # ── Step 2: OPTIMIZE existing pages (the daily default job) ──
      # First measure matured past experiments (and auto-revert regressions),
      # then apply new title/meta optimizations to near-page-1, low-CTR pages.

      - name: Measure matured experiments & revert regressions
        run: python scripts/optimize_seo.py --measure
        continue-on-error: true

      - name: Optimize titles/meta of low-CTR pages
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPT_MAX_CHANGES:  ${{ github.event.inputs.opt_max_changes || '8' }}
        run: python scripts/optimize_seo.py --apply
        continue-on-error: true

      # ── Step 3: Generate content (OPT-IN ONLY) ─────────────────
      # Disabled by default. Mass generation previously produced thin/duplicate
      # pages that hurt the domain. Enable per-run via the generate_pages input.

      - name: Generate content via DeepSeek API
        if: github.event.inputs.generate_pages == 'true'
        env:
          DEEPSEEK_API_KEY:       ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_ARTICLES:         ${{ github.event.inputs.max_articles || '3' }}
          MAX_TITLES:           ${{ github.event.inputs.max_titles   || '10' }}
          MAX_TYPEGEO:          ${{ github.event.inputs.max_typegeo  || '3' }}
        run: python scripts/generate_content.py
        continue-on-error: true

      - name: Update product descriptions via GSC data
        if: github.event.inputs.generate_pages == 'true'
        env:
          DEEPSEEK_API_KEY:          ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_PRODUCT_UPDATES:     ${{ github.event.inputs.max_product_updates || '5' }}
        run: python scripts/update_product_descriptions.py
        continue-on-error: true

      - name: Generate news articles
        if: github.event.inputs.generate_pages == 'true' && github.event.inputs.run_news == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/gen_news.py
        continue-on-error: true

      - name: Create geo output directories
        if: github.event.inputs.generate_pages == 'true'
        run: |
          for d in geo en/geo ar/geo kk/geo uz/geo ky/geo tg/geo az/geo ka/geo mn/geo ro/geo hy/geo be/geo; do
            mkdir -p "public/$d"
          done

      - name: Generate bulk geo pages
        if: github.event.inputs.generate_pages == 'true'
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          MAX_GEO_PAGES:    ${{ github.event.inputs.max_geo_pages || '100' }}
          GEO_WORKERS:      "5"
          GEO_SLEEP:        "0.5"
        run: |
          LANGS="${{ github.event.inputs.geo_langs }}"
          PRODUCTS="${{ github.event.inputs.geo_products }}"
          MODE="${{ github.event.inputs.geo_mode || 'all' }}"
          CMD="python scripts/generate_geo_bulk.py --mode $MODE --max-pages ${{ github.event.inputs.max_geo_pages || '100' }}"
          if [ -n "$LANGS" ]; then CMD="$CMD --langs $LANGS"; fi
          if [ -n "$PRODUCTS" ]; then CMD="$CMD --products $PRODUCTS"; fi
          eval $CMD
        continue-on-error: true

      # ── Step 5: Commit & push all changes ──────────────────────

      - name: Commit & push generated content
        run: |
          git config user.email "seo-agent@pepperoni.tatar"
          git config user.name  "SEO Agent"
          # Optimizer edits title/meta across any existing public/*.html page.
          # Stage every tracked HTML change (does NOT add brand-new untracked
          # files — those only appear when generate_pages=true and are staged
          # by the explicit globs below).
          git add -u "public/**/*.html" 2>/dev/null || true
          # Blog articles (RU + EN)
          git add "public/blog/*.html" 2>/dev/null || true
          git add "public/en/blog/*.html" 2>/dev/null || true
          # FAQ pages
          git add "public/faq/*.html" 2>/dev/null || true
          git add "public/en/faq/*.html" 2>/dev/null || true
          # Geo pages (type+geo + regular geo)
          git add "public/geo/*.html" 2>/dev/null || true
          # Bulk multilingual geo pages
          git add "public/en/geo/*.html" 2>/dev/null || true
          git add "public/ar/geo/*.html" 2>/dev/null || true
          git add "public/kk/geo/*.html" 2>/dev/null || true
          git add "public/uz/geo/*.html" 2>/dev/null || true
          git add "public/ky/geo/*.html" 2>/dev/null || true
          git add "public/tg/geo/*.html" 2>/dev/null || true
          git add "public/az/geo/*.html" 2>/dev/null || true
          git add "public/ka/geo/*.html" 2>/dev/null || true
          git add "public/mn/geo/*.html" 2>/dev/null || true
          git add "public/ro/geo/*.html" 2>/dev/null || true
          git add "public/hy/geo/*.html" 2>/dev/null || true
          git add "public/be/geo/*.html" 2>/dev/null || true
          # Durable experiment ledger (source of truth for the measure/revert loop)
          git add data/experiments.json 2>/dev/null || true
          # News section
          git add "public/news/*.html" 2>/dev/null || true
          # Updated pages and sitemap
          git add public/sitemap.xml public/index.html public/en/index.html 2>/dev/null || true
          git add public/pepperoni.html 2>/dev/null || true
          # Product card updates
          git add "public/products/*.html" "public/en/products/*.html" 2>/dev/null || true
          # Guard: never commit unresolved merge-conflict markers into prod.
          if git diff --cached --name-only -z | xargs -0 -r grep -lE '^(<{7}|={7}|>{7})( |$)' 2>/dev/null; then
            echo "::error::Merge-conflict markers detected in staged files — aborting commit."
            git reset
            exit 1
          fi
          if ! git diff --cached --quiet; then
            COUNT=$(git diff --cached --name-only | wc -l)
            MODE="optimize"; [ "${{ github.event.inputs.generate_pages }}" = "true" ] && MODE="optimize+generate"
            git commit -m "chore(seo): daily ${MODE} $(date +%Y-%m-%d) — ${COUNT} files"
            # Rebase onto latest main and retry push to survive races with manual pushes.
            for attempt in 1 2 3 4 5; do
              git pull --rebase --no-edit origin main || {
                echo "::error::Rebase hit a conflict — aborting to avoid pushing broken files.";
                git rebase --abort 2>/dev/null || true;
                exit 1;
              }
              if git push origin main; then
                echo "✅ Pushed ${COUNT} files (attempt ${attempt})"
                break
              fi
              echo "Push rejected (race), retrying… (${attempt}/5)"
              sleep $((attempt * 3))
            done
          else
            echo "No changes to commit"
          fi
        continue-on-error: true

      # ── Step 6: Index new URLs ─────────────────────────────────

      - name: Submit new URLs to Google Indexing API
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/gsc-index.py
        continue-on-error: true

      - name: Submit new URLs to Yandex
        env:
          YANDEX_WM_TOKEN: ${{ secrets.YANDEX_WM_TOKEN }}
        run: python scripts/yandex-index.py
        continue-on-error: true

      # ── Step 7: Daily report ───────────────────────────────────

      - name: Send daily report
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          REPORT_EMAIL:    ${{ secrets.REPORT_EMAIL }}
          SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASS:       ${{ secrets.SMTP_PASS }}
        run: python scripts/send_report.py
        continue-on-error: true
