name: SEO Audit (temp, manual only)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install cryptography
      - name: Fetch GSC queries
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/fetch_gsc_queries.py
      - name: Query->page map for blog (near page1)
        run: |
          python3 - <<'PY'
          import sqlite3, collections
          c = sqlite3.connect("data/seo_data.db"); c.row_factory = sqlite3.Row
          rows = list(c.execute("SELECT query,page,clicks,impressions,position FROM gsc_queries"))
          # best query per blog page (by impressions), with weighted position
          per = collections.defaultdict(lambda: collections.defaultdict(lambda:[0,0,0.0]))
          for r in rows:
              if "/blog/" not in (r["page"] or ""): continue
              a=per[r["page"]][r["query"]]; a[0]+=r["clicks"] or 0; a[1]+=r["impressions"] or 0; a[2]+=(r["position"] or 0)*(r["impressions"] or 0)
          print("PAGE\tTOP_QUERY\tIMPR\tCLK\tPOS")
          # rank pages by total impressions
          page_tot = {p: sum(v[1] for v in qd.values()) for p,qd in per.items()}
          for page in sorted(page_tot, key=lambda p:-page_tot[p])[:35]:
              qd = per[page]
              tq = max(qd, key=lambda q: qd[q][1])
              clk,impr,pw = qd[tq]
              pos = pw/impr if impr else 0
              # only show pages where we're page1-2 (pos<=20) — the tunable ones
              print(f"{page.replace('https://pepperoni.tatar','')}\t{tq}\t{page_tot[page]}\t{sum(v[0] for v in qd.values())}\t{pos:.1f}")
          PY
