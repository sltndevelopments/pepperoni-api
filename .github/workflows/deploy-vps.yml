name: Deploy to VPS

# Headless architecture:
#   pepperoni.tatar     → Vercel (HTML pages, marketing, catalog UI)
#   api.pepperoni.tatar → VPS    (data: products.json, openapi.yaml, llms.txt, sitemap-api.xml)
#
# This workflow deploys ONLY API/data files to the VPS. HTML pages are excluded
# from rsync — they live on Vercel.

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate product pages (HTML stays in repo for Vercel)
        run: |
          python3 scripts/gen-ru-products.py
          python3 scripts/gen-en-products.py

      - name: Add Core Web Vitals perf hints
        run: python3 scripts/add-perf-hints.py

      - name: Regenerate llms-full.txt (AI-ready, ~90 KB)
        run: python3 scripts/gen-llms-full.py

      - name: Rebuild sitemap.xml
        run: |
          python3 scripts/rebuild_sitemap.py
          echo "--- head ---"
          head -5 public/sitemap.xml
          echo "--- URL count ---"
          grep -c "<loc>" public/sitemap.xml

      - name: Commit regenerated files back to repo (for Vercel to pick up)
        run: |
          git config user.email "deploy-bot@pepperoni.tatar"
          git config user.name  "Deploy Bot"
          git add public/ || true
          if git diff --cached --quiet; then
            echo "ℹ️  no regenerated changes to commit"
          else
            git commit -m "chore(auto): regenerate HTML + sitemap + llms-full [skip ci]"
            git push origin HEAD:main || echo "⚠️  push failed (non-fatal — Vercel will use repo state)"
          fi

      - name: Deploy DATA-ONLY to VPS (HTML excluded — that's Vercel's job)
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: .
          remote_path: /var/www/pepperoni/repo
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          exclude: |
            .git*
            node_modules
            data/products.json
            data/products.json.tmp
            *.log
            public/*.html
            public/products/
            public/en/
            public/geo/
            public/blog/
            public/css/
            public/img/
            public/images/
            public/og-default.png

      - name: Install deps on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/pepperoni/repo && npm install --omit=dev

      - name: Update VPS nginx — serve API/data only (api.pepperoni.tatar)
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -x

            # 1) Generate /api/products flat JSON
            mkdir -p /var/www/pepperoni/static-api/api
            cp -f /var/www/pepperoni/repo/public/products.json /var/www/pepperoni/static-api/products.json
            node -e "
              const fs=require('fs');
              const d=JSON.parse(fs.readFileSync('/var/www/pepperoni/static-api/products.json','utf8'));
              const out={lastSynced:d.lastSynced,total:(d.products||[]).length,products:(d.products||[]).map(p=>({
                sku:p.sku, name:p.name, price:parseFloat(p.offers?.price||0), currency:p.offers?.priceCurrency||'RUB',
                image:p.image, brand:p.brand?.name, availability:p.offers?.availability
              }))};
              fs.writeFileSync('/var/www/pepperoni/static-api/api/products.json',JSON.stringify(out));
            " || cp /var/www/pepperoni/static-api/products.json /var/www/pepperoni/static-api/api/products.json

            chown -R www-data:www-data /var/www/pepperoni/static-api 2>/dev/null || true
            chmod -R a+r /var/www/pepperoni/static-api

            # 2) Write API/data nginx snippet (NO HTML routes — that's Vercel's job)
            mkdir -p /etc/nginx/snippets
            cat > /etc/nginx/snippets/pepperoni-api-data.conf <<'EOF'
            # ===== api.pepperoni.tatar — data feeds only =====
            location = /products.json {
                alias /var/www/pepperoni/static-api/products.json;
                add_header Cache-Control "public, max-age=60, must-revalidate" always;
                add_header Access-Control-Allow-Origin "*" always;
                default_type application/json;
            }
            location = /api/products {
                alias /var/www/pepperoni/static-api/api/products.json;
                add_header Cache-Control "public, max-age=60, must-revalidate" always;
                add_header Access-Control-Allow-Origin "*" always;
                default_type application/json;
            }
            location = /robots.txt {
                alias /var/www/pepperoni/repo/public/robots.txt;
                add_header Cache-Control "public, max-age=300" always;
                default_type text/plain;
            }
            location = /sitemap.xml {
                alias /var/www/pepperoni/repo/public/sitemap.xml;
                add_header Cache-Control "public, max-age=300" always;
                default_type application/xml;
            }
            location = /llms.txt {
                alias /var/www/pepperoni/repo/public/llms.txt;
                add_header Cache-Control "public, max-age=300" always;
                add_header Access-Control-Allow-Origin "*" always;
                default_type text/plain;
            }
            location = /llms-full.txt {
                alias /var/www/pepperoni/repo/public/llms-full.txt;
                add_header Cache-Control "public, max-age=300" always;
                add_header Access-Control-Allow-Origin "*" always;
                default_type text/plain;
            }
            location = /openapi.yaml {
                alias /var/www/pepperoni/repo/public/openapi.yaml;
                add_header Cache-Control "public, max-age=300" always;
                add_header Access-Control-Allow-Origin "*" always;
                default_type application/x-yaml;
            }
            location = /manifest.json {
                alias /var/www/pepperoni/repo/public/manifest.json;
                add_header Cache-Control "public, max-age=3600" always;
                default_type application/json;
            }
            # IndexNow key files (32-hex .txt at root)
            location ~ "^/[a-f0-9]{32}\.txt$" {
                root /var/www/pepperoni/repo/public;
                try_files $uri =404;
                add_header Cache-Control "public, max-age=86400" always;
                default_type text/plain;
            }
            # AI / discovery files
            location ^~ /.well-known/ {
                root /var/www/pepperoni/repo/public;
                add_header Cache-Control "public, max-age=300" always;
                add_header Access-Control-Allow-Origin "*" always;
                try_files $uri =404;
            }
            EOF

            # 3) Find api.pepperoni.tatar server block(s)
            API_CONFS=$(grep -rlE "server_name[[:space:]]+[^;]*api\.pepperoni\.tatar" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | grep -v '\.bak' || true)
            echo "API server configs: $API_CONFS"

            # 4) Inject include into api.pepperoni.tatar server block(s)
            for conf in $API_CONFS; do
              python3 - "$conf" <<'PYEOF'
            import re, sys
            path = sys.argv[1]
            with open(path) as f:
                src = f.read()
            # Remove any old pepperoni-static-data.conf include (from previous architecture)
            src = re.sub(r"^[ \t]*include[ \t]+/etc/nginx/snippets/pepperoni-static-data\.conf;[ \t]*\n", "", src, flags=re.M)
            inc = "    include /etc/nginx/snippets/pepperoni-api-data.conf;"
            pat = re.compile(r"(^[ \t]*server_name[^;\n]*api\.pepperoni\.tatar[^;\n]*;[ \t]*\n)", re.M)
            def repl(m):
                tail = src[m.end(): m.end()+300]
                if "pepperoni-api-data.conf" in tail[:300]:
                    return m.group(0)
                return m.group(0) + inc + "\n"
            new = pat.sub(repl, src)
            if new != src:
                with open(path, "w") as f:
                    f.write(new)
                print(f"  ✅ updated: {path}")
            else:
                print(f"  ℹ️  no change: {path}")
            PYEOF
            done

            # 5) Clean up legacy snippets/includes from the old (duplicated) architecture
            PEPPER_CONFS=$(grep -rlE "server_name[[:space:]]+[^;]*pepperoni\.tatar" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | grep -v '\.bak' | grep -v "api\." || true)
            echo "Non-api pepperoni server configs (should redirect to Vercel or be removed): $PEPPER_CONFS"
            for conf in $PEPPER_CONFS; do
              # Remove obsolete includes from pepperoni.tatar (non-api) blocks
              sed -i '/include \/etc\/nginx\/snippets\/pepperoni-static-data.conf;/d' "$conf"
              sed -i '/include \/etc\/nginx\/snippets\/pepperoni-api-data.conf;/d' "$conf"
            done

            # 6) Test and reload
            if nginx -t 2>&1; then
              systemctl reload nginx || nginx -s reload
              echo "✅ nginx reloaded"
            else
              echo "❌ nginx config error — check manually"
              nginx -t 2>&1 | head -20
            fi

            # 7) Smoke test — VPS should serve api.pepperoni.tatar data only
            echo "=== Smoke test (api.pepperoni.tatar) ==="
            for path in /products.json /api/products /llms.txt /openapi.yaml /.well-known/ai-meta.json /sitemap.xml; do
              code=$(curl -sI -o /dev/null -w "%{http_code}" -H "Host: api.pepperoni.tatar" "http://127.0.0.1$path")
              echo "  $path → HTTP $code"
            done

      - name: Enable AI-bot logging on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eux
            REPO=/var/www/pepperoni/repo
            SNIPPETS=/etc/nginx/snippets

            # 1) Install nginx snippet
            install -D -m 0644 "${REPO}/infra/nginx/ai-bots-logging.conf" \
              "${SNIPPETS}/ai-bots-logging.conf"
            echo "✅ snippet installed"

            # 2) Install logrotate policy
            install -D -m 0644 "${REPO}/infra/nginx/logrotate-ai-bots" \
              /etc/logrotate.d/nginx-ai-bots
            echo "✅ logrotate installed"

            # 3) Pre-create log file
            touch /var/log/nginx/ai-bots.log
            chown www-data:adm /var/log/nginx/ai-bots.log
            chmod 0640 /var/log/nginx/ai-bots.log
            echo "✅ log file created"

            # 4) Install parser script
            install -D -m 0755 "${REPO}/infra/scripts/parse-ai-bots.py" \
              /opt/pepperoni-api/infra/scripts/parse-ai-bots.py
            echo "✅ parser installed"

            # 5) Install daily cron job
            cat > /etc/cron.d/pepperoni-ai-bots <<'CRON'
            # /etc/cron.d/pepperoni-ai-bots — daily AI-bot digest at 06:05 server time
            MAILTO=""
            5 6 * * * root /usr/bin/python3 /opt/pepperoni-api/infra/scripts/parse-ai-bots.py > /var/log/nginx/parse-ai-bots.cron 2>&1
            CRON
            echo "✅ cron installed"

            # 6) Inject include into api.pepperoni.tatar server block(s)
            API_CONFS=$(grep -rlE "server_name[[:space:]]+[^;]*api\.pepperoni\.tatar" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ 2>/dev/null | grep -v '\.bak' || true)
            echo "API server configs: ${API_CONFS}"
            for conf in $API_CONFS; do
              if grep -q "ai-bots-logging.conf" "$conf"; then
                echo "  ℹ️  already includes ai-bots-logging in ${conf}"
                continue
              fi
              # Insert after the server_name line within the api.pepperoni.tatar block
              python3 - "$conf" <<'PYEOF'
            import re, sys
            path = sys.argv[1]
            with open(path) as f:
                src = f.read()
            inc = "    include snippets/ai-bots-logging.conf;"
            pat = re.compile(r"(^[ \t]*server_name[^;\n]*api\.pepperoni\.tatar[^;\n]*;[ \t]*\n)", re.M)
            new = pat.sub(r"\1" + inc + "\n", src)
            if new != src:
                with open(path, "w") as f:
                    f.write(new)
                print(f"  ✅ added include to {path}")
            else:
                print(f"  ❌ could not inject into {path}")
            PYEOF
            done

            # 7) Test and reload nginx
            if nginx -t 2>&1; then
              systemctl reload nginx || nginx -s reload
              echo "✅ nginx reloaded"
            else
              echo "❌ nginx config error"
              nginx -t 2>&1 | head -20
            fi

      - name: Write SEO Agent env file on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          YANDEX_WM_TOKEN:         ${{ secrets.YANDEX_WM_TOKEN }}
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          INDEXNOW_KEY:            ${{ secrets.INDEXNOW_KEY }}
          BING_CLIENT_ID:          ${{ secrets.BING_CLIENT_ID }}
          BING_CLIENT_SECRET:      ${{ secrets.BING_CLIENT_SECRET }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GSC_SERVICE_ACCOUNT_KEY,YANDEX_WM_TOKEN,CLAUDE_API_KEY,INDEXNOW_KEY,BING_CLIENT_ID,BING_CLIENT_SECRET,GH_PAT
          script: |
            GSC_B64=$(echo "$GSC_SERVICE_ACCOUNT_KEY" | base64 -w0)
            {
              echo "GSC_SERVICE_ACCOUNT_KEY_B64=$GSC_B64"
              echo "YANDEX_WM_TOKEN=$YANDEX_WM_TOKEN"
              echo "CLAUDE_API_KEY=$CLAUDE_API_KEY"
              echo "INDEXNOW_KEY=$INDEXNOW_KEY"
              echo "BING_CLIENT_ID=$BING_CLIENT_ID"
              echo "BING_CLIENT_SECRET=$BING_CLIENT_SECRET"
              echo "GITHUB_TOKEN=$GH_PAT"
            } > /var/www/pepperoni/seo-agent.env
            chmod 600 /var/www/pepperoni/seo-agent.env
            echo "✅ seo-agent.env written"

            git config --global --add safe.directory /var/www/pepperoni/repo
            cd /var/www/pepperoni/repo
            git config user.email "seo-agent@pepperoni.tatar"
            git config user.name  "SEO Agent"
            B64=$(echo -n "x-access-token:${GH_PAT}" | base64 -w0)
            git config http.https://github.com/.extraheader "Authorization: Basic ${B64}"
            git fetch origin main --quiet 2>&1 && echo "✅ git fetch OK"

      - name: Update API data on VPS + clear nginx cache
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/data
            cp /var/www/pepperoni/repo/public/products.json /var/www/pepperoni/data/products.json
            echo "✅ data/products.json updated: $(python3 -c "import json; d=json.load(open('/var/www/pepperoni/data/products.json')); print(len(d['products']), 'products')" 2>/dev/null || echo 'copied')"

            nginx -T 2>/dev/null | grep "proxy_cache_path\|fastcgi_cache_path" | awk '{print $2}' | while read cache_dir; do
              [ -d "$cache_dir" ] && rm -rf "$cache_dir"/* && echo "Cleared: $cache_dir"
            done
            for cache_dir in /var/cache/nginx /tmp/nginx_cache /var/www/pepperoni/cache; do
              [ -d "$cache_dir" ] && rm -rf "$cache_dir"/* && echo "Cleared: $cache_dir" || true
            done
            nginx -t 2>/dev/null && (systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null || true)

      - name: Install SEO Agent + sync cron on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/repo/data/logs

            CRON_LINE="30 5 * * * bash /var/www/pepperoni/repo/scripts/seo-agent-vps.sh >> /var/log/pepperoni-seo-agent.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "seo-agent-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ SEO agent cron installed"
            fi

            SYNC_CRON="*/10 * * * * bash /var/www/pepperoni/repo/scripts/sync-vps.sh >> /var/log/pepperoni-sync.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "sync-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$SYNC_CRON") | crontab -
              echo "✅ Price sync cron installed"
            fi
            crontab -l

      - name: Ping IndexNow (Bing + Yandex + Seznam)
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          sleep 5
          KEY="${INDEXNOW_KEY:-2164b9a639c7455aad8651dc19e48641}"
          echo "=== Verify key file: https://pepperoni.tatar/${KEY}.txt ==="
          curl -s -o /tmp/keyfile.txt -w "HTTP %{http_code}\n" "https://pepperoni.tatar/${KEY}.txt"
          echo "=== Submit URLs ==="
          python3 scripts/bing-index.py || echo "⚠️  IndexNow non-fatal"

      - name: Delete stale certbot backups
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            find /etc/nginx -name "*.certbot.bak*" -mtime +0 -delete 2>/dev/null || true
            nginx -t && (systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null || true)
