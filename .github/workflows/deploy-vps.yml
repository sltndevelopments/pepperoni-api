name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: .
          remote_path: /var/www/pepperoni/repo
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          exclude: |
            .git*
            node_modules
            data/products.json
            data/products.json.tmp
            *.log

      - name: Install deps on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/pepperoni/repo && npm install --omit=dev

      - name: Write SEO Agent env file on VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          YANDEX_WM_TOKEN:         ${{ secrets.YANDEX_WM_TOKEN }}
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          INDEXNOW_KEY:            ${{ secrets.INDEXNOW_KEY }}
          BING_CLIENT_ID:          ${{ secrets.BING_CLIENT_ID }}
          BING_CLIENT_SECRET:      ${{ secrets.BING_CLIENT_SECRET }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GSC_SERVICE_ACCOUNT_KEY,YANDEX_WM_TOKEN,CLAUDE_API_KEY,INDEXNOW_KEY,BING_CLIENT_ID,BING_CLIENT_SECRET,GH_PAT
          script: |
            # GSC key is JSON — base64-encode it so it fits on one line safely
            GSC_B64=$(echo "$GSC_SERVICE_ACCOUNT_KEY" | base64 -w0)
            {
              echo "GSC_SERVICE_ACCOUNT_KEY_B64=$GSC_B64"
              echo "YANDEX_WM_TOKEN=$YANDEX_WM_TOKEN"
              echo "CLAUDE_API_KEY=$CLAUDE_API_KEY"
              echo "INDEXNOW_KEY=$INDEXNOW_KEY"
              echo "BING_CLIENT_ID=$BING_CLIENT_ID"
              echo "BING_CLIENT_SECRET=$BING_CLIENT_SECRET"
              echo "GITHUB_TOKEN=$GH_PAT"
            } > /var/www/pepperoni/seo-agent.env
            chmod 600 /var/www/pepperoni/seo-agent.env
            echo "✅ seo-agent.env written ($(wc -c < /var/www/pepperoni/seo-agent.env) bytes)"

            # Set up git on VPS so SEO agent can commit & push autonomously
            git config --global --add safe.directory /var/www/pepperoni/repo
            cd /var/www/pepperoni/repo
            git config user.email "seo-agent@pepperoni.tatar"
            git config user.name  "SEO Agent"
            # Use http.extraheader with x-access-token (GitHub PAT format for git over HTTPS)
            B64=$(echo -n "x-access-token:${GH_PAT}" | base64 -w0)
            git config http.https://github.com/.extraheader "Authorization: Basic ${B64}"
            git fetch origin main --quiet 2>&1 && echo "✅ git fetch OK — agent can push"

      - name: Fix nginx routing — serve all HTML pages from public/
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            ROOT=/var/www/pepperoni/repo/public
            NGINX_CONF=$(find /etc/nginx/sites-available/ -name "pepperoni*" 2>/dev/null | head -1)
            echo "nginx config: ${NGINX_CONF:-not found}"

            if [ -z "$NGINX_CONF" ]; then
              echo "⚠️  No pepperoni nginx config found — skipping"
              exit 0
            fi

            if grep -q "pepperoni-clean-urls" "$NGINX_CONF" 2>/dev/null; then
              echo "✅ nginx already patched"
              exit 0
            fi

            # Write patch via Python (avoids bash $ escaping issues for nginx vars)
            python3 - "$NGINX_CONF" "$ROOT" << 'PYEOF'
            import re, sys
            conf_path, root = sys.argv[1], sys.argv[2]
            with open(conf_path) as f:
                content = f.read()
            patch = """
                # BEGIN pepperoni-clean-urls (auto-generated)
                location = /dlya-azs            { alias """ + root + """/dlya-azs.html; default_type text/html; }
                location = /dlya-pekaren        { alias """ + root + """/dlya-pekaren.html; default_type text/html; }
                location = /dlya-setey          { alias """ + root + """/dlya-setey.html; default_type text/html; }
                location = /dlya-horeca         { alias """ + root + """/dlya-horeca.html; default_type text/html; }
                location = /dlya-distributorov  { alias """ + root + """/dlya-distributorov.html; default_type text/html; }
                location = /kontraktnoe-proizvodstvo { alias """ + root + """/kontraktnoe-proizvodstvo.html; default_type text/html; }
                location ~ ^/(geo|products|en)(/.*)?$ {
                    root """ + root + """;
                    try_files $uri $uri.html $uri/index.html =404;
                    default_type text/html;
                }
                # END pepperoni-clean-urls
            """
            # Insert before last closing brace in the file
            new_content = content.rstrip().rsplit('}', 1)
            if len(new_content) == 2:
                result = new_content[0] + patch + '\n}\n'
                with open(conf_path, 'w') as f:
                    f.write(result)
                print("patched OK")
            else:
                print("ERROR: could not find closing brace")
                sys.exit(1)
            PYEOF

            nginx -t 2>&1 && systemctl reload nginx && echo "✅ nginx reloaded" || echo "❌ nginx test failed — check $NGINX_CONF manually"

      - name: Install SEO Agent cron on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/repo/data/logs
            mkdir -p /var/www/pepperoni/repo/public/blog

            # Add SEO agent cron if not already present
            CRON_LINE="30 5 * * * bash /var/www/pepperoni/repo/scripts/seo-agent-vps.sh >> /var/log/pepperoni-seo-agent.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "seo-agent-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ SEO agent cron installed (08:30 MSK daily)"
            else
              echo "ℹ️  SEO agent cron already present"
            fi
            crontab -l | grep seo-agent
