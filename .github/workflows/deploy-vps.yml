name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: .
          remote_path: /var/www/pepperoni/repo
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          exclude: |
            .git*
            node_modules
            data/products.json
            data/products.json.tmp
            *.log

      - name: Install deps on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/pepperoni/repo && npm install --omit=dev

      - name: Write SEO Agent env file on VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          YANDEX_WM_TOKEN:         ${{ secrets.YANDEX_WM_TOKEN }}
          CLAUDE_API_KEY:          ${{ secrets.CLAUDE_API_KEY }}
          INDEXNOW_KEY:            ${{ secrets.INDEXNOW_KEY }}
          BING_CLIENT_ID:          ${{ secrets.BING_CLIENT_ID }}
          BING_CLIENT_SECRET:      ${{ secrets.BING_CLIENT_SECRET }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GSC_SERVICE_ACCOUNT_KEY,YANDEX_WM_TOKEN,CLAUDE_API_KEY,INDEXNOW_KEY,BING_CLIENT_ID,BING_CLIENT_SECRET,GH_PAT
          script: |
            # GSC key is JSON — base64-encode it so it fits on one line safely
            GSC_B64=$(echo "$GSC_SERVICE_ACCOUNT_KEY" | base64 -w0)
            {
              echo "GSC_SERVICE_ACCOUNT_KEY_B64=$GSC_B64"
              echo "YANDEX_WM_TOKEN=$YANDEX_WM_TOKEN"
              echo "CLAUDE_API_KEY=$CLAUDE_API_KEY"
              echo "INDEXNOW_KEY=$INDEXNOW_KEY"
              echo "BING_CLIENT_ID=$BING_CLIENT_ID"
              echo "BING_CLIENT_SECRET=$BING_CLIENT_SECRET"
              echo "GITHUB_TOKEN=$GH_PAT"
            } > /var/www/pepperoni/seo-agent.env
            chmod 600 /var/www/pepperoni/seo-agent.env
            echo "✅ seo-agent.env written ($(wc -c < /var/www/pepperoni/seo-agent.env) bytes)"

            # Set up git on VPS so SEO agent can commit & push autonomously
            git config --global --add safe.directory /var/www/pepperoni/repo
            cd /var/www/pepperoni/repo
            git config user.email "seo-agent@pepperoni.tatar"
            git config user.name  "SEO Agent"
            # Use http.extraheader with x-access-token (GitHub PAT format for git over HTTPS)
            B64=$(echo -n "x-access-token:${GH_PAT}" | base64 -w0)
            git config http.https://github.com/.extraheader "Authorization: Basic ${B64}"
            git fetch origin main --quiet 2>&1 && echo "✅ git fetch OK — agent can push"

      - name: Update API data/products.json on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/data
            cp /var/www/pepperoni/repo/public/products.json /var/www/pepperoni/data/products.json
            echo "✅ data/products.json updated: $(python3 -c "import json; d=json.load(open('/var/www/pepperoni/data/products.json')); print(len(d['products']), 'products, first price:', d['products'][0]['offers'].get('price','?'))" 2>/dev/null || echo 'copied')"

      - name: Install SEO Agent cron on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/repo/data/logs
            mkdir -p /var/www/pepperoni/repo/public/blog

            # Add SEO agent cron if not already present
            CRON_LINE="30 5 * * * bash /var/www/pepperoni/repo/scripts/seo-agent-vps.sh >> /var/log/pepperoni-seo-agent.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "seo-agent-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ SEO agent cron installed (08:30 MSK daily)"
            else
              echo "ℹ️  SEO agent cron already present"
            fi

            # Add price sync cron if not already present (every 10 min)
            SYNC_CRON="*/10 * * * * bash /var/www/pepperoni/repo/scripts/sync-vps.sh >> /var/log/pepperoni-sync.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "sync-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$SYNC_CRON") | crontab -
              echo "✅ Price sync cron installed (every 10 min)"
            else
              echo "ℹ️  Price sync cron already present"
            fi
            echo "=== Current crontab ===" && crontab -l

      - name: Fix nginx config and SSL on VPS
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== 1. Certbot backup files ==="
            find /etc/nginx -name "*.certbot.bak*" 2>/dev/null || echo "No backups found"

            echo "=== 2. Current nginx config (relevant lines) ==="
            nginx -T 2>/dev/null | grep -E "server_name|root |ssl_cert|listen|403|deny" | head -40 || true

            echo "=== 3. Restore from certbot backup ==="
            find /etc/nginx -name "*.certbot.bak*" 2>/dev/null | while read bak; do
              # Strip certbot suffix (handles .certbot.bak and .certbot.bak.TIMESTAMP)
              original=$(echo "$bak" | sed 's/\.certbot\.bak.*//')
              if [ -f "$original" ] || [ ! -f "$original" ]; then
                cp "$bak" "$original"
                echo "  Restored: $bak -> $original"
              fi
            done

            echo "=== 4. Update SSL cert path to new Let's Encrypt cert ==="
            CERT_DIR="/etc/letsencrypt/live/pepperoni.tatar"
            if [ -f "$CERT_DIR/fullchain.pem" ]; then
              for conf in $(find /etc/nginx -name "*.conf" -not -name "*.bak*" 2>/dev/null); do
                if grep -q "pepperoni\|ssl_certificate" "$conf" 2>/dev/null; then
                  sed -i "s|ssl_certificate [^;]*;|ssl_certificate $CERT_DIR/fullchain.pem;|g" "$conf"
                  sed -i "s|ssl_certificate_key [^;]*;|ssl_certificate_key $CERT_DIR/privkey.pem;|g" "$conf"
                  echo "  Updated SSL in: $conf"
                fi
              done
            fi

            echo "=== 5. nginx -t ==="
            nginx -t 2>&1 || true

            echo "=== 6. Reload nginx ==="
            systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null || true

            echo "=== 7. Test endpoint ==="
            sleep 2
            curl -sk https://localhost/ -H "Host: pepperoni.tatar" | head -c 200 || true
