name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploy = git sync, NOT rsync --delete. The VPS repo is a live git clone
      # whose untracked files are runtime state the agents create between
      # commits (sqlite DB, strategy.json, freshly generated pages). The old
      # rsync --delete wiped anything not yet on GitHub on EVERY deploy —
      # silently destroying the brain's strategy and the SEO database whenever
      # a push raced the daily pipeline. git reset --hard updates tracked files
      # and leaves untracked runtime state alone.
      - name: Deploy via git sync
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/pepperoni/repo
            git fetch origin main
            git reset --hard origin/main
            echo "Deployed: $(git log -1 --oneline)"
            # nginx serves /videos/ from media/, not repo/public/videos/
            if [ -d public/videos ]; then
              mkdir -p /var/www/pepperoni/media/videos
              cp -f public/videos/* /var/www/pepperoni/media/videos/
            fi

      - name: Install deps on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: cd /var/www/pepperoni/repo && npm install --omit=dev

      - name: Write SEO Agent env file on VPS
        uses: appleboy/ssh-action@v1.0.0
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
          YANDEX_WM_TOKEN:         ${{ secrets.YANDEX_WM_TOKEN }}
          YANDEX_METRIKA_TOKEN:    ${{ secrets.YANDEX_METRIKA_TOKEN }}
          LEADS_BOT_TOKEN:         ${{ secrets.LEADS_BOT_TOKEN }}
          LEADS_GROUP_ID:          ${{ secrets.LEADS_GROUP_ID }}
          DEEPSEEK_API_KEY:          ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_PROXY:         ${{ secrets.ANTHROPIC_PROXY }}
          ANTHROPIC_PROXY_FALLBACK: ${{ secrets.ANTHROPIC_PROXY_FALLBACK }}
          ASOCKS_API_KEY:          ${{ secrets.ASOCKS_API_KEY }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_PASSWORD:             ${{ secrets.TG_PASSWORD }}
          PPLX_API_KEY:            ${{ secrets.PPLX_API_KEY }}
          YANDEX_SEARCH_API_KEY:   ${{ secrets.YANDEX_SEARCH_API_KEY }}
          INDEXNOW_KEY:            ${{ secrets.INDEXNOW_KEY }}
          BING_CLIENT_ID:          ${{ secrets.BING_CLIENT_ID }}
          BING_CLIENT_SECRET:      ${{ secrets.BING_CLIENT_SECRET }}
          GH_PAT:                  ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GSC_SERVICE_ACCOUNT_KEY,YANDEX_WM_TOKEN,YANDEX_METRIKA_TOKEN,LEADS_BOT_TOKEN,LEADS_GROUP_ID,DEEPSEEK_API_KEY,ANTHROPIC_API_KEY,ANTHROPIC_PROXY,ANTHROPIC_PROXY_FALLBACK,ASOCKS_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,TG_PASSWORD,PPLX_API_KEY,YANDEX_SEARCH_API_KEY,INDEXNOW_KEY,BING_CLIENT_ID,BING_CLIENT_SECRET,GH_PAT
          script: |
            # GSC key is JSON — base64-encode it so it fits on one line safely
            GSC_B64=$(echo "$GSC_SERVICE_ACCOUNT_KEY" | base64 -w0)
            {
              echo "GSC_SERVICE_ACCOUNT_KEY_B64=$GSC_B64"
              echo "YANDEX_WM_TOKEN=$YANDEX_WM_TOKEN"
              echo "YANDEX_METRIKA_TOKEN=${YANDEX_METRIKA_TOKEN:-}"
              echo "LEADS_BOT_TOKEN=${LEADS_BOT_TOKEN:-}"
              echo "LEADS_GROUP_ID=${LEADS_GROUP_ID:-}"
              echo "DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY"
              echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
              echo "ANTHROPIC_PROXY=$ANTHROPIC_PROXY"
              echo "ANTHROPIC_PROXY_FALLBACK=${ANTHROPIC_PROXY_FALLBACK:-}"
              echo "ASOCKS_API_KEY=${ASOCKS_API_KEY:-}"
              # Dedicated monthly budget for the BRAIN (Fable + escalations),
              # tracked separately from the "hands" via data/opus_budget.json.
              echo "OPUS_MONTHLY_BUDGET_USD=30"
              # Brain model. Fable 5 was suspended for all Anthropic customers by
              # a US gov export-control directive (2026-06-12); using Opus 4.8
              # (half the price). Set to claude-fable-5 here if/when it returns.
              echo "OPUS_MODEL=claude-opus-4-8"
              # Cost & quality controls (set 2026-06-11). Quality mode: no new geo
              # generation, aggressive CTR optimization of existing pages, hard
              # daily spend cap. See scripts/claude_client.py:_budget_guard.
              echo "LLM_DAILY_BUDGET_USD=5"
              # GEO_PER_TICK caps the 3-hourly worker; the brain steers the real
              # daily volume via strategy.geo_daily_target. 3×8 ticks = 24/day max.
              echo "GEO_PER_TICK=3"
              echo "OPT_POS_LOW=1.5"
              echo "OPT_POS_HIGH=20"
              echo "OPT_MAX_CHANGES=20"
              echo "OPT_MIN_IMPR=25"
              echo "OPT_MAX_CTR=0.02"
              echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"
              echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}"
              echo "TG_PASSWORD=${TG_PASSWORD:-}"
              echo "PPLX_API_KEY=${PPLX_API_KEY:-}"
              echo "YANDEX_SEARCH_API_KEY=${YANDEX_SEARCH_API_KEY:-}"
              echo "INDEXNOW_KEY=$INDEXNOW_KEY"
              echo "BING_CLIENT_ID=$BING_CLIENT_ID"
              echo "BING_CLIENT_SECRET=$BING_CLIENT_SECRET"
              echo "GITHUB_TOKEN=$GH_PAT"
            } > /var/www/pepperoni/seo-agent.env
            chmod 600 /var/www/pepperoni/seo-agent.env
            echo "✅ seo-agent.env written ($(wc -c < /var/www/pepperoni/seo-agent.env) bytes)"
            # (re)start the Telegram bot if a token is configured
            if grep -q "^TELEGRAM_BOT_TOKEN=." /var/www/pepperoni/seo-agent.env; then
              systemctl restart pepperoni-tgbot.service 2>/dev/null || true
              echo "🤖 telegram bot (re)started"
            fi

            # Set up git on VPS so SEO agent can commit & push autonomously
            git config --global --add safe.directory /var/www/pepperoni/repo
            cd /var/www/pepperoni/repo
            git config user.email "seo-agent@pepperoni.tatar"
            git config user.name  "SEO Agent"
            # SSH deploy key (gh_deploy_key) is used for git push/pull — no PAT needed.
            # Verify SSH remote is set and fetch works.
            git remote set-url origin git@github.com:sltndevelopments/pepperoni-api.git
            git fetch origin main --quiet 2>&1 && echo "✅ git fetch OK via SSH deploy key"

      - name: Update API data/products.json on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/data
            cp /var/www/pepperoni/repo/public/products.json /var/www/pepperoni/data/products.json
            echo "✅ data/products.json updated: $(python3 -c "import json; d=json.load(open('/var/www/pepperoni/data/products.json')); print(len(d['products']), 'products, first price:', d['products'][0]['offers'].get('price','?'))" 2>/dev/null || echo 'copied')"

      - name: Restart partner-intake service on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # partner-intake is managed by systemd (unit already installed by
            # deploy-partner-intake.sh). git reset --hard above updated the code;
            # restart picks up any changes to partner-intake-server.py.
            # Using systemctl restart (not nohup) so systemd manages restarts.
            if systemctl is-enabled partner-intake &>/dev/null; then
              systemctl restart partner-intake
              sleep 2
              if ss -tlnp | grep -q ':5001'; then
                echo "✅ partner-intake restarted and listening on :5001"
              else
                echo "⚠️  partner-intake restarted but :5001 not listening — check logs"
                journalctl -u partner-intake --no-pager -n 20
              fi
            else
              echo "ℹ️  partner-intake unit not installed yet — skipping restart (run deploy-partner-intake.sh once to install)"
            fi

      - name: Install SEO Agent cron on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /var/www/pepperoni/repo/data/logs
            mkdir -p /var/www/pepperoni/repo/public/blog

            # Add SEO agent cron if not already present
            CRON_LINE="30 5 * * * bash /var/www/pepperoni/repo/scripts/seo-agent-vps.sh >> /var/log/pepperoni-seo-agent.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "seo-agent-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              echo "✅ SEO agent cron installed (08:30 MSK daily)"
            else
              echo "ℹ️  SEO agent cron already present"
            fi

            # Add price sync cron if not already present (every 10 min)
            SYNC_CRON="*/10 * * * * bash /var/www/pepperoni/repo/scripts/sync-vps.sh >> /var/log/pepperoni-sync.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "sync-vps.sh"; then
              (crontab -l 2>/dev/null; echo "$SYNC_CRON") | crontab -
              echo "✅ Price sync cron installed (every 10 min)"
            else
              echo "ℹ️  Price sync cron already present"
            fi

            # Add pipeline watchdog cron (2h after the daily agent starts)
            WATCHDOG_CRON="30 7 * * * cd /var/www/pepperoni/repo && python3 scripts/pipeline_watchdog.py >> /var/log/pepperoni-watchdog.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "pipeline_watchdog.py"; then
              (crontab -l 2>/dev/null; echo "$WATCHDOG_CRON") | crontab -
              echo "✅ Pipeline watchdog cron installed (10:30 MSK daily)"
            else
              echo "ℹ️  Pipeline watchdog cron already present"
            fi
            echo "=== Current crontab ===" && crontab -l

      - name: Ensure sales-agent/sales-intel cron & systemd point at repo/ (no drift copy)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 2026-07-02: sales-agent/sales-intel used to live as a manually-copied
            # directory NEXT TO repo/ (not a git clone) — every push landed in repo/
            # but never reached the cron-executed copy without a manual `cp`, so code
            # silently drifted for weeks. Fixed by running these dirs straight out of
            # repo/ (same git clone deploy-vps.yml already updates). This step is
            # idempotent — it only rewrites cron/systemd if they still point at the
            # old standalone path, so re-running deploy never breaks a healthy setup.
            if crontab -l 2>/dev/null | grep -q "cd /var/www/pepperoni/sales-agent "; then
              crontab -l | sed 's#cd /var/www/pepperoni/sales-agent #cd /var/www/pepperoni/repo/sales-agent #g' | crontab -
              echo "✅ crontab: sales-agent cron repointed to repo/sales-agent"
            fi
            if [ -f /etc/cron.d/kd-sales-intel ] && grep -q "cd /var/www/pepperoni " /etc/cron.d/kd-sales-intel; then
              sed -i 's#cd /var/www/pepperoni #cd /var/www/pepperoni/repo #g' /etc/cron.d/kd-sales-intel
              echo "✅ /etc/cron.d/kd-sales-intel repointed to repo/"
            fi
            if [ -f /etc/systemd/system/kd-sales-bot.service ] && grep -q "/var/www/pepperoni/sales-agent" /etc/systemd/system/kd-sales-bot.service; then
              sed -i 's#/var/www/pepperoni/sales-agent#/var/www/pepperoni/repo/sales-agent#g' /etc/systemd/system/kd-sales-bot.service
              systemctl daemon-reload
              systemctl restart kd-sales-bot 2>/dev/null || true
              echo "✅ kd-sales-bot.service repointed to repo/sales-agent and restarted"
            fi
            echo "=== sales-agent/sales-intel cron (should show repo/) ==="
            crontab -l | grep -E "sales-agent|sales-intel" || true
            cat /etc/cron.d/kd-sales-intel 2>/dev/null || true

      - name: Ensure kd-sales-track (email open-tracking) systemd unit exists and runs
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 2026-07-05: introduced with the open-tracking pixel fix — recreate the
            # unit if missing (fresh VPS / lost state) so deploy stays idempotent.
            if [ ! -f /etc/systemd/system/kd-sales-track.service ]; then
              cat > /etc/systemd/system/kd-sales-track.service << 'UNIT'
            [Unit]
            Description=KD Sales Email Open Tracking Server
            After=network-online.target
            Wants=network-online.target

            [Service]
            Type=simple
            WorkingDirectory=/var/www/pepperoni/repo/sales-agent
            ExecStart=/usr/bin/python3 -m channels.track_server 8081
            Restart=always
            RestartSec=15
            StandardOutput=append:/var/www/pepperoni/repo/sales-agent/data/track_server.log
            StandardError=append:/var/www/pepperoni/repo/sales-agent/data/track_server.log

            [Install]
            WantedBy=multi-user.target
            UNIT
              systemctl daemon-reload
              systemctl enable kd-sales-track.service
              echo "✅ kd-sales-track.service created"
            fi
            systemctl restart kd-sales-track.service
            sleep 1
            systemctl is-active kd-sales-track.service && echo "✅ kd-sales-track.service active"
