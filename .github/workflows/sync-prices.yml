name: Sync prices from Google Sheets

on:
  schedule:
    # Каждый день в 06:00 по Москве (03:00 UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Ручной запуск из GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Disabled 2026-07-02 (Task 0.2, stop dual scheduling): duplicates
    # scripts/sync-vps.sh, which already runs every 10 min on the VPS cron
    # (the canonical catalog sync per .cursor/rules/pepperoni-infra.mdc).
    # Running both raced on git push and risked stale-cache drift.
    if: false

    steps:
      - name: Checkout repository (main — Vercel production branch)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate product descriptions for new/empty SKUs (Claude)
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_PROXY:    ${{ secrets.ANTHROPIC_PROXY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping description generation"
            exit 0
          fi
          # First pass builds products.json so the generator sees current SKUs/empty fields
          node scripts/sync-sheets.mjs
          python3 scripts/gen-descriptions.py || echo "[warn] description generation failed; keeping existing overrides"

      - name: Sync data from Google Sheets
        run: node scripts/sync-sheets.mjs

      - name: Regenerate llms.txt + en/llms.txt + products-feed.* (rich AI context)
        run: python3 scripts/gen-llms-full.py

      - name: Regenerate RU product pages
        run: python3 scripts/gen-ru-products.py

      - name: Regenerate EN product pages
        run: python3 scripts/gen-en-products.py

      - name: Rebuild comprehensive sitemap.xml (covers blog, geo, EN landings)
        run: python3 scripts/rebuild_sitemap.py

      - name: Lint — fail if any canonical points to api.pepperoni.tatar
        run: |
          set -e
          # User-facing pages should canonicalise to pepperoni.tatar, never api.*
          if grep -l 'rel="canonical" href="https://api\.pepperoni\.tatar' public/products/*.html public/en/products/*.html 2>/dev/null; then
            echo "❌ Found api.pepperoni.tatar canonical in product HTML. Failing build."
            exit 1
          fi
          if grep -q 'https://api\.pepperoni\.tatar/products/' public/sitemap.xml; then
            echo "❌ sitemap.xml contains api.pepperoni.tatar product URLs."
            exit 1
          fi
          echo "✅ All canonicals point to pepperoni.tatar"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/products.json public/llms.txt public/llms-full.txt public/sitemap.xml
          git add data/descriptions-overrides.json
          git add public/en/llms.txt public/en/llms-full.txt
          git add public/products/*.html
          git add public/en/products/*.html
          git add public/products-feed.csv public/products-feed.xml public/products-feed.json
          git add public/products-feed-ae.xml public/products-feed-arab.xml public/products-feed-cis.xml
          git add public/products-feed-sa.xml public/products-feed-kw.xml public/products-feed-om.xml
          git add public/products-feed-eg.xml public/products-feed-bh.xml public/products-feed-qa.xml
          git add public/products-feed-ye.xml
          git add public/products-feed-by.xml public/products-feed-kz.xml public/products-feed-uz.xml
          git add public/products-feed-ge.xml public/products-feed-kg.xml public/products-feed-az.xml
          git add public/products-feed-tj.xml public/products-feed-am.xml
          git commit -m "🔄 Auto-sync prices + regenerate product pages [$(date -u +%Y-%m-%d)]"
          git push
