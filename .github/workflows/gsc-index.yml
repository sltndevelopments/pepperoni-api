name: Google Search Console — Indexing & Sitemap

on:
  workflow_run:
    workflows: ["Deploy to VPS"]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/gsc-index.py'
      - 'scripts/gsc-sitemap.py'
      - 'public/sitemap.xml'

jobs:
  gsc:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install cryptography

      - name: Submit sitemap to Google Search Console
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/gsc-sitemap.py
        continue-on-error: true

      - name: Submit URLs to Google Indexing API
        env:
          GSC_SERVICE_ACCOUNT_KEY: ${{ secrets.GSC_SERVICE_ACCOUNT_KEY }}
        run: python scripts/gsc-index.py

      - name: Submit URLs to Yandex Webmaster
        env:
          YANDEX_WM_TOKEN: ${{ secrets.YANDEX_WM_TOKEN }}
        run: python scripts/yandex-index.py
        continue-on-error: true
