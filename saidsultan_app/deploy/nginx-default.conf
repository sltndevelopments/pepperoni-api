# Конфиг для /etc/nginx/sites-available/default
# Скопировать на сервер: sudo cp deploy/nginx-default.conf /etc/nginx/sites-available/default && sudo systemctl restart nginx

server {
    listen 80 default_server;
    server_name saidsultan.com www.saidsultan.com _;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Передаем заголовки Cloudflare в наш стартап для безопасности
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header True-Client-IP $http_true_client_ip;
    }
}
