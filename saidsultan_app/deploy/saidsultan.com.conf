# Конфиг для saidsultan.com
# Копировать: sudo cp deploy/saidsultan.com.conf /etc/nginx/sites-available/
# Включить:   sudo ln -sf /etc/nginx/sites-available/saidsultan.com.conf /etc/nginx/sites-enabled/
# Перезапуск: sudo nginx -t && sudo systemctl restart nginx

server {
    listen 80;
    server_name saidsultan.com www.saidsultan.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header True-Client-IP $http_true_client_ip;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }
}
