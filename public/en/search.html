  <h1>Search the halal product catalog</h1>

  <form class="search-bar" onsubmit="event.preventDefault();go(document.getElementById('q').value)">
    <input id="q" type="search" name="q" placeholder="Pepperoni, sausage, KD-001, kazylyk…" autofocus autocomplete="off">
    <button type="submit">Search</button>
  </form>

  <div id="meta" class="meta"></div>
  <div id="results" class="results"></div>

<script>
function go(q){
  q = (q||'').trim();
  const url = new URL(location.href);
  if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
  history.replaceState(null, '', url);
  render(q);
}

async function init(){
  const q = new URLSearchParams(location.search).get('q') || '';
  document.getElementById('q').value = q;
  window._catalog = await fetch('/products.json').then(r=>r.json()).then(d=>d.products||[]);
  render(q);
}

function render(q){
  const meta = document.getElementById('meta');
  const list = document.getElementById('results');
  if (!q){
    meta.textContent = 'Type a query — search across 64 SKUs by name, SKU, category, or ingredient.';
    list.innerHTML = '';
    return;
  }
  const needle = q.toLowerCase();
  const out = (window._catalog||[]).filter(p=>{
    return [p.nameEN||p.name, p.sku, p.categoryEN||p.category, p.sectionEN||p.section, p.ingredientsEN||p.ingredientsRU||''].some(s=>(s||'').toLowerCase().includes(needle));
  });
  meta.textContent = `Found: ${out.length} of ${(window._catalog||[]).length} · "${q}"`;
  if (!out.length){
    list.innerHTML = `<div class="empty">Nothing found for "${q}".<br><a href="/en/">Browse the full catalog →</a></div>`;
    return;
  }
  list.innerHTML = out.map(p=>{
    const slug = (p.sku||'').toLowerCase();
    const price = p.offers && (p.offers.price || p.offers.pricePerUnit) || '';
    return `
      <div class="sku">${p.sku||''}</div>
      <div class="name">${p.nameEN||p.name||''}</div>
      <div class="cat">${p.categoryEN||p.category||p.section||''}</div>
      <div class="price">${price ? price + ' ₽' : 'on request'}</div>
    `;
  }).join('');
}
init();
</script>
