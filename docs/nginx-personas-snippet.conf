# Pepperoni VPS: nginx snippet для новых clean URL персон/партнёров
# Файл: /etc/nginx/sites-available/pepperoni.tatar (или include-файл)
# После правки: sudo nginx -t && sudo systemctl reload nginx

# === 6 персон-страниц ===
location = /dlya-azs {
    alias /var/www/pepperoni/repo/public/dlya-azs.html;
    default_type text/html;
}
location = /dlya-pekaren {
    alias /var/www/pepperoni/repo/public/dlya-pekaren.html;
    default_type text/html;
}
location = /dlya-setey {
    alias /var/www/pepperoni/repo/public/dlya-setey.html;
    default_type text/html;
}
location = /dlya-horeca {
    alias /var/www/pepperoni/repo/public/dlya-horeca.html;
    default_type text/html;
}
location = /dlya-distributorov {
    alias /var/www/pepperoni/repo/public/dlya-distributorov.html;
    default_type text/html;
}
location = /kontraktnoe-proizvodstvo {
    alias /var/www/pepperoni/repo/public/kontraktnoe-proizvodstvo.html;
    default_type text/html;
}

# === Партнёры ===
location = /partnery {
    alias /var/www/pepperoni/repo/public/partnery.html;
    default_type text/html;
}

# === 301-редиректы со старых /pepperoni-dlya-* на новые ===
location = /pepperoni-dlya-azs          { return 301 /dlya-azs;              }
location = /pepperoni-dlya-pekaren      { return 301 /dlya-pekaren;          }
location = /pepperoni-dlya-setey        { return 301 /dlya-setey;            }
location = /pepperoni-dlya-horeca       { return 301 /dlya-horeca;           }
location = /pepperoni-dlya-distribyutorov { return 301 /dlya-distributorov; }
location = /pepperoni-private-label     { return 301 /kontraktnoe-proizvodstvo; }

# === ВАРИАНТ ЛУЧШЕ: универсальный catch для любых .html в public/ ===
# Вместо всех location выше можно добавить в существующий location / {} или
