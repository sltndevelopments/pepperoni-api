# Lead Intake — nginx reverse-proxy snippet
# Include inside the server {} block for BOTH pepperoni.tatar and
# api.pepperoni.tatar so the site form can POST same-origin:
#   include /etc/nginx/snippets/lead-intake.conf;
#
# The form posts to /lead-submit; requests are proxied to the Flask
# lead-intake server on 127.0.0.1:5002, which forwards the lead into the
# leads Telegram group. Keep the body small (no file uploads on this form).

location = /lead-submit {
    proxy_pass http://127.0.0.1:5002;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 16k;
}

location = /lead-health {
    proxy_pass http://127.0.0.1:5002;
    proxy_set_header Host $host;
}
