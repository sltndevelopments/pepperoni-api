# /etc/nginx/snippets/ai-bots-logging.conf
# Include this file inside the `server { ... }` block of
# api.pepperoni.tatar and pepperoni.tatar (if it ever moves to VPS).
#
#     include snippets/ai-bots-logging.conf;
#
# It detects AI-crawler User-Agents and writes them to a dedicated
# log file alongside the standard access log.
#
# Parsed daily by /opt/pepperoni-api/infra/scripts/parse-ai-bots.py

# ----------------------------------------------------------------------
# 1. Map User-Agent → bot name (case-insensitive matching).
#    Update this list whenever a new AI crawler appears in the wild.
#    Empty string ("") means "not an AI bot".
# ----------------------------------------------------------------------
map $http_user_agent $ai_bot_name {
    default                          "";
    "~*GPTBot"                       "openai-gptbot";
    "~*ChatGPT-User"                 "openai-chatgpt-user";
    "~*OAI-SearchBot"                "openai-search";
    "~*PerplexityBot"                "perplexity-bot";
    "~*Perplexity-User"              "perplexity-user";
    "~*Perplexity\.ai"               "perplexity-ai";
    "~*ClaudeBot"                    "anthropic-claudebot";
    "~*Claude-Web"                   "anthropic-claude-web";
    "~*anthropic-ai"                 "anthropic-ai";
    "~*Google-Extended"              "google-extended";
    "~*GoogleOther"                  "google-other";
    "~*Bard"                         "google-bard";
    "~*Gemini"                       "google-gemini";
    "~*Applebot-Extended"            "apple-applebot-extended";
    "~*Applebot"                     "apple-applebot";
    "~*DuckAssistBot"                "duckduckgo-assistant";
    "~*Bytespider"                   "bytedance-bytespider";
    "~*meta-externalagent"           "meta-externalagent";
    "~*FacebookBot"                  "meta-facebookbot";
    "~*FacebookExternalHit"          "meta-fb-external-hit";
    "~*Diffbot"                      "diffbot";
    "~*YouBot"                       "you-com";
    "~*cohere-ai"                    "cohere-ai";
    "~*DeepSeek"                     "deepseek";
    "~*Kagibot"                      "kagi";
    "~*Mistral"                      "mistral";
    "~*PhindBot"                     "phind";
    "~*YandexGPT"                    "yandex-gpt";
    "~*ImagesiftBot"                 "imagesift";
    "~*CCBot"                        "common-crawl";
    "~*AwarioRssBot"                 "awario";
    "~*AwarioSmartBot"               "awario-smart";
}

# ----------------------------------------------------------------------
# 2. Compose a JSON log line — only when $ai_bot_name is non-empty.
#    Format suitable for jq / Loki / Vector ingestion.
# ----------------------------------------------------------------------
log_format ai_bots escape=json
    '{'
    '"ts":"$time_iso8601",'
    '"bot":"$ai_bot_name",'
    '"ip":"$remote_addr",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"ref":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"rt":$request_time'
    '}';

# ----------------------------------------------------------------------
# 3. Write filtered lines to a dedicated file with daily rotation
#    (logrotate config at /etc/logrotate.d/nginx-ai-bots).
# ----------------------------------------------------------------------
map $ai_bot_name $ai_bot_log_if_match {
    default 0;
    "~^."   1;          # any non-empty bot name → log
}

access_log /var/log/nginx/ai-bots.log ai_bots if=$ai_bot_log_if_match;
