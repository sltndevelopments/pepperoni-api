# Partner Intake — nginx reverse-proxy snippet
# Include this inside the server {} block for api.pepperoni.tatar
# (If your server block is in /etc/nginx/sites-enabled/, add:
#   include /etc/nginx/snippets/partner-intake.conf;
# )

# Increase upload size for catalog files (20 MB)
client_max_body_size 20m;

# Proxy form submissions to the Python partner-intake server
location /partner-submit {
    proxy_pass http://127.0.0.1:5001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Forward the original request body size
    proxy_request_buffering off;
    client_max_body_size 20m;
}
