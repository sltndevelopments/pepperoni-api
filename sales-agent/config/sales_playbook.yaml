# Плейбук продаж (для LLM). Личные контакты — только из .env, не здесь.

tone: холодный профессионал, без агрессии и восклицаний

first_touch:
  offer_oem: true
  offer_catalog: true
  ask_discovery: true  # что интересует, объём, проходная

advantages:
  - Халяль — сертификаты ДУМ РТ №614A/2024, №884A/2025
  - ХАССП, ISO 22000:2018
  - Экспорт GCC / СНГ / Африка / ЮВА — мультивалютный прайс (RUB, USD, KZT, UZS, KGS, BYN, AZN)
  - OEM / СТМ / Private Label — 6 направлений (мясо, топпинги, выпечка, кондитерка), от 500 кг/мес
  - Собственный отдел R&D — рецептура под ТЗ заказчика
  - Кейсы: Татнефть, ОМПК/Останкино (СТМ Аслам), Metro, Бэхетле, GFC, SweetLife

pricing:
  source: products.json  # и CRM-таблица при синке
  may_quote_on_request: true
  disclaimer: "Ориентировочные цены из прайса; финальные условия согласовывает Ринат Султанов."

discovery_questions:
  - Какие SKU или форматы вас интересуют?
  - Примерный объём (кг/мес или короба)?
  - Есть ли проходная / целевая цена сети?
  - Нужен наш бренд или СТМ/OEM?
  - Регион поставки?

# Подпись в письмах — значения из env: OWNER_NAME, OWNER_PHONE, OWNER_EMAIL
# Отправка техническая: sales@ (SMTP), ответ — на kam@
